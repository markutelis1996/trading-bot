<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Trading Bot Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        background: radial-gradient(ellipse at top, #0f172a 0%, #020617 60%);
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Inter", sans-serif;
      }
      .glass {
        background: rgba(15, 23, 42, 0.55);
        backdrop-filter: blur(14px);
        border: 1px solid rgba(148, 163, 184, 0.12);
        box-shadow: 0 24px 60px -28px rgba(56, 189, 248, 0.15), 0 1px 0 rgba(255, 255, 255, 0.04) inset;
      }
      .stat-up {
        color: #34d399;
      }
      .stat-down {
        color: #f87171;
      }
      .pulse-dot {
        width: 8px;
        height: 8px;
        background: #34d399;
        border-radius: 50%;
        animation: pulse 2s infinite;
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.5; transform: scale(1.3); }
      }
      button.period-btn {
        transition: transform 120ms ease, background-color 200ms ease;
      }
      button.period-btn:hover {
        transform: translateY(-1px);
      }
      button.period-btn.active {
        background: linear-gradient(135deg, rgba(56, 189, 248, 0.25), rgba(168, 85, 247, 0.25));
        border-color: rgba(125, 211, 252, 0.45);
        color: #f1f5f9;
      }
    </style>
  </head>
  <body class="min-h-screen text-slate-200">
    <div class="max-w-7xl mx-auto px-6 py-10">
      <header class="flex items-center justify-between mb-10">
        <div>
          <div class="flex items-center gap-3">
            <div class="pulse-dot"></div>
            <span class="text-xs uppercase tracking-[0.3em] text-emerald-400">Live · Paper</span>
          </div>
          <h1 class="text-3xl md:text-4xl font-semibold mt-2 text-slate-100">Trading Bot Dashboard</h1>
          <p class="text-slate-400 text-sm mt-1">Portfolio performance vs S&P 500 benchmark</p>
        </div>
        <div class="text-right text-xs text-slate-500" id="updatedAt">Loading…</div>
      </header>

      <section class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-10" id="stats"></section>

      <section class="glass rounded-2xl p-6 md:p-8 mb-10">
        <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4 mb-6">
          <div>
            <h2 class="text-xl font-semibold text-slate-100">Equity Curve vs S&P 500</h2>
            <p class="text-sm text-slate-400">Both indexed to 100 at period start</p>
          </div>
          <div class="flex gap-2 flex-wrap" id="periodSelector">
            <button data-period="1W" class="period-btn px-3 py-1.5 text-xs rounded-full border border-slate-700 text-slate-400">1W</button>
            <button data-period="1M" class="period-btn active px-3 py-1.5 text-xs rounded-full border border-slate-700 text-slate-400">1M</button>
            <button data-period="3M" class="period-btn px-3 py-1.5 text-xs rounded-full border border-slate-700 text-slate-400">3M</button>
            <button data-period="6M" class="period-btn px-3 py-1.5 text-xs rounded-full border border-slate-700 text-slate-400">6M</button>
            <button data-period="1Y" class="period-btn px-3 py-1.5 text-xs rounded-full border border-slate-700 text-slate-400">1Y</button>
            <button data-period="ALL" class="period-btn px-3 py-1.5 text-xs rounded-full border border-slate-700 text-slate-400">ALL</button>
          </div>
        </div>
        <div class="h-[420px]">
          <canvas id="chart"></canvas>
        </div>
      </section>

      <section class="glass rounded-2xl p-6 md:p-8">
        <h2 class="text-xl font-semibold text-slate-100 mb-4">Open Positions</h2>
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead class="text-xs uppercase tracking-wider text-slate-500 border-b border-slate-800">
              <tr>
                <th class="text-left py-3">Ticker</th>
                <th class="text-right py-3">Shares</th>
                <th class="text-right py-3">Entry</th>
                <th class="text-right py-3">Current</th>
                <th class="text-right py-3">Market Value</th>
                <th class="text-right py-3">P&L</th>
                <th class="text-right py-3">%</th>
              </tr>
            </thead>
            <tbody id="positions" class="divide-y divide-slate-800/60"></tbody>
          </table>
        </div>
      </section>

      <footer class="text-center text-xs text-slate-600 mt-10">
        Auto-refreshes every 60 seconds. Source:
        <a href="https://github.com/markutelis1996/trading-bot" class="underline hover:text-slate-400">github.com/markutelis1996/trading-bot</a>
      </footer>
    </div>

    <script>
      let chart = null;
      let currentPeriod = '1M';

      const fmtUSD = (n) =>
        new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 2 }).format(n);
      const fmtPct = (n) => `${n >= 0 ? '+' : ''}${(n * 100).toFixed(2)}%`;

      function renderStats(data) {
        const acc = data.account || {};
        const equity = parseFloat(acc.equity || 0);
        const baseValue = parseFloat(data.portfolio?.base_value || equity);
        const totalPL = equity - baseValue;
        const totalPLPct = baseValue ? totalPL / baseValue : 0;

        const eq = data.portfolio?.equity || [];
        const dayPL = eq.length >= 2 ? eq[eq.length - 1] - eq[0] : 0;
        const dayPLPct = eq.length >= 2 && eq[0] ? dayPL / eq[0] : 0;

        const spy = data.spy || [];
        let spyPct = 0;
        if (spy.length >= 2) spyPct = (spy[spy.length - 1].c - spy[0].c) / spy[0].c;

        const alpha = totalPLPct - spyPct;

        const stats = [
          { label: 'Portfolio', value: fmtUSD(equity), sub: `Cash ${fmtUSD(parseFloat(acc.cash || 0))}` },
          {
            label: `${currentPeriod} P&L`,
            value: fmtUSD(dayPL),
            sub: fmtPct(dayPLPct),
            cls: dayPL >= 0 ? 'stat-up' : 'stat-down',
          },
          {
            label: `S&P 500 ${currentPeriod}`,
            value: fmtPct(spyPct),
            sub: 'SPY benchmark',
            cls: spyPct >= 0 ? 'stat-up' : 'stat-down',
          },
          {
            label: 'Alpha vs SPY',
            value: fmtPct(alpha),
            sub: alpha >= 0 ? 'Beating market' : 'Trailing market',
            cls: alpha >= 0 ? 'stat-up' : 'stat-down',
          },
        ];

        document.getElementById('stats').innerHTML = stats
          .map(
            (s) => `
          <div class="glass rounded-xl p-5">
            <div class="text-[11px] uppercase tracking-wider text-slate-500">${s.label}</div>
            <div class="text-2xl font-semibold mt-2 ${s.cls || 'text-slate-100'}">${s.value}</div>
            <div class="text-xs text-slate-500 mt-1">${s.sub}</div>
          </div>
        `,
          )
          .join('');
      }

      function renderPositions(positions) {
        if (!positions || positions.length === 0) {
          document.getElementById('positions').innerHTML = `<tr><td colspan="7" class="text-center py-8 text-slate-500">No open positions yet — bot is patient.</td></tr>`;
          return;
        }
        document.getElementById('positions').innerHTML = positions
          .map((p) => {
            const plPct = parseFloat(p.unrealized_plpc) * 100;
            const plClr = plPct >= 0 ? 'stat-up' : 'stat-down';
            return `
              <tr class="hover:bg-slate-800/30 transition-colors">
                <td class="py-3 font-medium text-slate-100">${p.symbol}</td>
                <td class="py-3 text-right text-slate-300">${p.qty}</td>
                <td class="py-3 text-right text-slate-400">${fmtUSD(parseFloat(p.avg_entry_price))}</td>
                <td class="py-3 text-right text-slate-300">${fmtUSD(parseFloat(p.current_price))}</td>
                <td class="py-3 text-right text-slate-300">${fmtUSD(parseFloat(p.market_value))}</td>
                <td class="py-3 text-right ${plClr}">${fmtUSD(parseFloat(p.unrealized_pl))}</td>
                <td class="py-3 text-right ${plClr}">${plPct >= 0 ? '+' : ''}${plPct.toFixed(2)}%</td>
              </tr>
            `;
          })
          .join('');
      }

      function indexTo100(values) {
        if (!values.length) return [];
        const base = values[0];
        if (!base) return [];
        return values.map((v) => (v / base) * 100);
      }

      function renderChart(data) {
        const ts = data.portfolio?.timestamps || [];
        const eq = data.portfolio?.equity || [];
        const portfolioIdx = indexTo100(eq);

        const spyMap = new Map((data.spy || []).map((b) => [new Date(b.t).getTime(), b.c]));
        const labels = ts.map((t) => new Date(t * 1000));

        let lastSpy = null;
        const spyAligned = labels.map((d) => {
          const t = d.getTime();
          let closest = null;
          for (const [bt, c] of spyMap) {
            if (Math.abs(bt - t) < 36 * 60 * 60 * 1000) {
              if (!closest || Math.abs(bt - t) < Math.abs(closest[0] - t)) closest = [bt, c];
            }
          }
          if (closest) lastSpy = closest[1];
          return lastSpy;
        });
        const spyIdx = indexTo100(spyAligned.filter((v) => v != null));

        const ctx = document.getElementById('chart').getContext('2d');
        if (chart) chart.destroy();

        const portfolioColor = portfolioIdx.length && portfolioIdx[portfolioIdx.length - 1] >= 100 ? '#34d399' : '#f87171';
        const portfolioGradient = ctx.createLinearGradient(0, 0, 0, 420);
        portfolioGradient.addColorStop(0, portfolioColor + '55');
        portfolioGradient.addColorStop(1, portfolioColor + '00');

        chart = new Chart(ctx, {
          type: 'line',
          data: {
            labels,
            datasets: [
              {
                label: 'Bot Portfolio',
                data: portfolioIdx,
                borderColor: portfolioColor,
                backgroundColor: portfolioGradient,
                borderWidth: 2.5,
                fill: true,
                tension: 0.3,
                pointRadius: 0,
                pointHoverRadius: 5,
              },
              {
                label: 'S&P 500 (SPY)',
                data: spyIdx,
                borderColor: '#7dd3fc',
                borderWidth: 2,
                borderDash: [6, 4],
                fill: false,
                tension: 0.3,
                pointRadius: 0,
                pointHoverRadius: 5,
              },
            ],
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            interaction: { mode: 'index', intersect: false },
            scales: {
              x: {
                type: 'time',
                time: { tooltipFormat: 'PP HH:mm', displayFormats: { day: 'MMM d', hour: 'MMM d HH:mm' } },
                grid: { color: 'rgba(148, 163, 184, 0.06)' },
                ticks: { color: '#64748b', maxRotation: 0 },
              },
              y: {
                grid: { color: 'rgba(148, 163, 184, 0.06)' },
                ticks: {
                  color: '#64748b',
                  callback: (v) => `${v.toFixed(1)}`,
                },
              },
            },
            plugins: {
              legend: { labels: { color: '#cbd5e1', usePointStyle: true, pointStyle: 'circle' } },
              tooltip: {
                backgroundColor: 'rgba(2, 6, 23, 0.92)',
                borderColor: 'rgba(148, 163, 184, 0.2)',
                borderWidth: 1,
                padding: 12,
                titleColor: '#f1f5f9',
                bodyColor: '#cbd5e1',
                callbacks: {
                  label: (ctx) => `${ctx.dataset.label}: ${ctx.parsed.y.toFixed(2)} (${(ctx.parsed.y - 100).toFixed(2)}%)`,
                },
              },
            },
          },
        });
      }

      async function load() {
        try {
          const res = await fetch(`/api/performance?period=${currentPeriod}`);
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const data = await res.json();
          renderStats(data);
          renderPositions(data.positions);
          renderChart(data);
          document.getElementById('updatedAt').textContent =
            'Updated ' + new Date(data.generated_at).toLocaleTimeString();
        } catch (err) {
          document.getElementById('updatedAt').textContent = 'Error: ' + err.message;
        }
      }

      document.getElementById('periodSelector').addEventListener('click', (e) => {
        const btn = e.target.closest('button[data-period]');
        if (!btn) return;
        document.querySelectorAll('.period-btn').forEach((b) => b.classList.remove('active'));
        btn.classList.add('active');
        currentPeriod = btn.dataset.period;
        load();
      });

      load();
      setInterval(load, 60000);
    </script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
  </body>
</html>
